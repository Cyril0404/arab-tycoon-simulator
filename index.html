    });

    const leaderboardByCategory = computed(() => {
      if (lbTab.value === '总资产') return leaderboard.value;

      const catMap = { '汽车': 'car', '房产': 'home', '宠物': 'pet', '奢侈品': 'lux' };
      const prefix = catMap[lbTab.value];
      if (!prefix) return leaderboard.value;

      // Count items in category
      const getCatAssets = (items) => {
        return items
          .filter(id => id.startsWith(prefix))
          .reduce((s, id) => s + (getItemById(id)?.price || 0), 0);
      };

      let list = PRESET_LEADERS.map(l => ({
        ...l,
        rank: 0,
        assets: lbTab.value === '总资产' ? l.assets : Math.floor(l.assets * (Math.random() * 0.3 + 0.1)),
      }));

      list.push({ name: '你', emoji: '😎', isYou: true, rank: 0, assets: getCatAssets(ownedItems.value) });

      list.sort((a, b) => b.assets - a.assets);
      return list.map((l, i) => ({ ...l, rank: i + 1 }));
    });

    // Friends with dynamic assets
    const friends = computed(() => {
      return PRESET_FRIENDS.map(f => ({
        ...f,
        level: getLevel(f.assets),
      }));
    });

    // Owned items with details
    const ownedItemsList = computed(() => {
      return ownedItems.value.map(id => getItemById(id)).filter(Boolean);
    });

    // ============ WORK V2.0 COMPUTED ============
    // Get work level config
    const currentWorkLevelConfig = computed(() => {
      return WORK_LEVEL_CONFIG.find(l => l.level === workLevel.value) || WORK_LEVEL_CONFIG[0];
    });

    // Work level progress
    const workLevelProgress = computed(() => {
      const currentConfig = currentWorkLevelConfig.value;
      const nextConfig = WORK_LEVEL_CONFIG.find(l => l.level === workLevel.value + 1);
      if (!nextConfig) return 100;
      return Math.min(100, ((workExp.value - currentConfig.exp) / (nextConfig.exp - currentConfig.exp)) * 100);
    });

    // Check which works are unlocked based on total assets
    const availableWorks = computed(() => {
      const assets = totalAssets.value;
      return WORK_TYPES_V2.map(w => ({
        ...w,
        unlocked: assets >= w.unlock,
        onCooldown: workCooldowns.value[w.id] && currentTime.value < workCooldowns.value[w.id],
        cooldownRemaining: workCooldowns.value[w.id] ? Math.max(0, Math.floor((workCooldowns.value[w.id] - currentTime.value) / 1000)) : 0,
      }));
    });

    // Staff income per second
    const staffIncomePerSec = computed(() => {
      let total = 0;
      for (const [staffId, count] of Object.entries(ownedStaff.value)) {
        const staff = STAFF_TYPES.find(s => s.id === staffId);
        if (staff) total += staff.incomePerSec * count;
      }
      return total;
    });

    // Get staff price with inflation (15% increase per owned)
    const getStaffPrice = (staffId) => {
      const staff = STAFF_TYPES.find(s => s.id === staffId);
      if (!staff) return 0;
      const count = ownedStaff.value[staffId] || 0;
      return Math.floor(staff.basePrice * Math.pow(1.15, count));
    };

    // Get staff list for display
    const ownedStaffList = computed(() => {
      return STAFF_TYPES.map(s => ({
        ...s,
        count: ownedStaff.value[s.id] || 0,
        price: getStaffPrice(s.id),
        income: s.incomePerSec * (ownedStaff.value[s.id] || 0),
      }));
    });

    // Active contacts with remaining info
    const activeContactsDisplay = computed(() => {
      return activeContacts.value.map(c => {
        const contactDef = CONTACTS.find(ct => ct.id === c.id);
        return {
          ...c,
          name: contactDef?.name || c.id,
          icon: contactDef?.icon || '❓',
          desc: contactDef?.desc || '',
        };
      });
    });

    // Combo multiplier display
    const comboDisplay = computed(() => {
      if (comboCount.value >= 10) return { count: comboCount.value, multiplier: 2.0, text: '×2.0', active: true, color: '#ff6b6b' };
      if (comboCount.value >= 3) return { count: comboCount.value, multiplier: 1.5, text: '×1.5', active: true, color: '#ffa500' };
      return { count: 0, multiplier: 1.0, text: '连击: 0', active: false, color: 'transparent' };
    });

    // Get work earnings with all multipliers
    const getWorkEarnings = (workType) => {
      const work = WORK_TYPES_V2.find(w => w.id === workType);
      if (!work) return 0;

      let earnings = work.baseEarnings;

      // Apply work level multiplier
      earnings *= currentWorkLevelConfig.value.multiplier;

      // Apply combo multiplier
      earnings *= comboDisplay.value.multiplier;

      // Apply contact buffs (only for specific work types)
      const businessContact = activeContacts.value.find(c => c.buff === 'business_bonus');
      if (businessContact) earnings *= (1 + businessContact.buffValue);

      return Math.floor(earnings);
    };

    // Get cooldown for work type (affected by work level)
    const getWorkCooldown = (workType) => {
      const work = WORK_TYPES_V2.find(w => w.id === workType);
      if (!work) return work.cooldown;

      // Lv.3: cooldown -20%, Lv.5: cooldown -50%, Lv.MAX: no cooldown
      const level = workLevel.value;
      if (level >= 6) return 0; // Lv.MAX no cooldown
      if (level >= 5) return Math.floor(work.cooldown * 0.5);
      if (level >= 3) return Math.floor(work.cooldown * 0.8);
      return work.cooldown;
    };

    // Oil futures computed
    const oilPositionValue = computed(() => {
      if (!oilPosition.value) return 0;
      return oilPrice.value;
    });

    const oilProfitLoss = computed(() => {
      if (!oilPosition.value || !oilEntryPrice.value) return 0;
      const diff = oilPrice.value - oilEntryPrice.value;
      return Math.floor(diff * 1000); // Scale to AED
    });

    const oilTrendClass = computed(() => oilTrend.value === 1 ? 'up' : 'down');

    // ============ METHODS ============
    function showToast(msg, type = '') {
      if (toastTimer) clearTimeout(toastTimer);
      toast.value = { msg, type };
      toastTimer = setTimeout(() => { toast.value = null; }, 2200);
    }

    function save() {
      const data = {
        cash: cash.value,
        ownedItems: ownedItems.value,
        lastWorkTime: lastWorkTime.value,
        lastBusinessTime: lastBusinessTime.value,
        lastInvestTime: lastInvestTime.value,
        title: playerTitle.value,
        titleExpiry: titleExpiry.value,
        // Territory System
        ownedTerritories: ownedTerritories.value,
        // Daily Signin
        lastSigninDate: lastSigninDate.value,
        signinHistory: signinHistory.value,
        // Charity
        charityTotal: charityTotal.value,
        // Rental
        rentalEnabled: rentalEnabled.value,
        // PK stats
        pkWins: pkWins.value,
        totalSpent: totalSpent.value,
        // Achievements
        unlockedAchievements: unlockedAchievements.value,
        // Daily tasks
        workCount: workCount.value,
        businessCount: businessCount.value,
        investCount: investCount.value,
        completedTasks: completedTasks.value,
        lastResetDate: lastResetDate.value,
        // Liked friends
        likedFriends: Array.from(likedFriends.value),
        lastLikeDate: lastLikeDate.value,
        // Wealth History
        wealthHistory: wealthHistory.value,
        // Work System V2
        unlockedWorks: unlockedWorks.value,
        workCooldowns: workCooldowns.value,
        workLevel: workLevel.value,
        workExp: workExp.value,
        ownedStaff: ownedStaff.value,
        // Oil Futures
        oilPosition: oilPosition.value,
        oilEntryPrice: oilEntryPrice.value,
      };
      localStorage.setItem(SAVE_KEY, JSON.stringify(data));
      // 同步到 Firestore
      if (currentUser) {
        saveToFirestore(currentUser.uid, data);
      }
    }

    function load() {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        cash.value = data.cash ?? 1000;
        ownedItems.value = data.ownedItems ?? [];
        lastWorkTime.value = data.lastWorkTime ?? 0;
        lastBusinessTime.value = data.lastBusinessTime ?? 0;
        lastInvestTime.value = data.lastInvestTime ?? 0;
        playerTitle.value = data.title ?? '';
        titleExpiry.value = data.titleExpiry ?? 0;

        // Reset expired cooldowns
        const now = Date.now();
        if (lastWorkTime.value > 0 && now - lastWorkTime.value >= 60000) lastWorkTime.value = 0;
        if (lastBusinessTime.value > 0 && now - lastBusinessTime.value >= 600000) lastBusinessTime.value = 0;
        if (lastInvestTime.value > 0 && now - lastInvestTime.value >= 3600000) lastInvestTime.value = 0;

        // Clear expired title
        if (titleExpiry.value > 0 && now >= titleExpiry.value) {
          playerTitle.value = '';
          titleExpiry.value = 0;
        }

        // Load new state
        ownedTerritories.value = data.ownedTerritories ?? [];
        lastSigninDate.value = data.lastSigninDate ?? '';
        signinHistory.value = data.signinHistory ?? [];
        charityTotal.value = data.charityTotal ?? 0;
        rentalEnabled.value = data.rentalEnabled ?? true;
        pkWins.value = data.pkWins ?? 0;
        totalSpent.value = data.totalSpent ?? 0;
        unlockedAchievements.value = data.unlockedAchievements ?? [];
        workCount.value = data.workCount ?? 0;
        businessCount.value = data.businessCount ?? 0;
        investCount.value = data.investCount ?? 0;
        completedTasks.value = data.completedTasks ?? [];
        lastResetDate.value = data.lastResetDate ?? '';
        likedFriends.value = new Set(data.likedFriends ?? []);
        lastLikeDate.value = data.lastLikeDate ?? '';
        wealthHistory.value = (data.wealthHistory || []).map(r => ({ ...r, time: new Date(r.time) }));
        // Work System V2
        unlockedWorks.value = data.unlockedWorks ?? ['carpet'];
        workCooldowns.value = data.workCooldowns ?? {};
        workLevel.value = data.workLevel ?? 1;
        workExp.value = data.workExp ?? 0;
        ownedStaff.value = data.ownedStaff ?? {};
        // Oil Futures
        oilPosition.value = data.oilPosition ?? null;
        oilEntryPrice.value = data.oilEntryPrice ?? 0;

        // Check if signin needs reset (new day)
        const today = new Date().toDateString();
        if (lastSigninDate.value && lastSigninDate.value !== today) {
          // It's a new day, can sign in again
        }
      } catch (e) { /* ignore */ }
    }

    async function startGame() {
      // 先初始化游戏状态（localStorage 优先）
      load();
      started.value = true;
      addWealthRecord();
      updateCooldowns();
      cdInterval = setInterval(() => {
        currentTime.value = Date.now();
        updateCooldowns();
      }, 1000);
      startStaffIncome();
      startOilFutures();

      // 后台异步加载 Firebase 数据并合并
      if (typeof firebase !== 'undefined' && firebase.apps.length >= 0) {
        (async () => {
          try {
            if (!currentUser) {
              await signInAnonymously();
            }
            if (auth.currentUser) {
              currentUser = auth.currentUser;
              const cloudData = await loadFromFirestore(currentUser.uid);
              if (cloudData) {
                // 用云端数据覆盖本地状态
                cash.value = cloudData.cash ?? cash.value;
                ownedItems.value = cloudData.ownedItems ?? ownedItems.value;
                lastWorkTime.value = cloudData.lastWorkTime ?? lastWorkTime.value;
                lastBusinessTime.value = cloudData.lastBusinessTime ?? lastBusinessTime.value;
                lastInvestTime.value = cloudData.lastInvestTime ?? lastInvestTime.value;
                playerTitle.value = cloudData.title ?? playerTitle.value;
                titleExpiry.value = cloudData.titleExpiry ?? titleExpiry.value;
                ownedTerritories.value = cloudData.ownedTerritories ?? ownedTerritories.value;
                lastSigninDate.value = cloudData.lastSigninDate ?? lastSigninDate.value;
                signinHistory.value = cloudData.signinHistory ?? signinHistory.value;
                charityTotal.value = cloudData.charityTotal ?? charityTotal.value;
                rentalEnabled.value = cloudData.rentalEnabled ?? rentalEnabled.value;
                pkWins.value = cloudData.pkWins ?? pkWins.value;
                totalSpent.value = cloudData.totalSpent ?? totalSpent.value;
                unlockedAchievements.value = cloudData.unlockedAchievements ?? unlockedAchievements.value;
                workCount.value = cloudData.workCount ?? workCount.value;
                businessCount.value = cloudData.businessCount ?? businessCount.value;
                investCount.value = cloudData.investCount ?? investCount.value;
                completedTasks.value = cloudData.completedTasks ?? completedTasks.value;
                lastResetDate.value = cloudData.lastResetDate ?? lastResetDate.value;
                likedFriends.value = new Set(cloudData.likedFriends ?? []);
                lastLikeDate.value = cloudData.lastLikeDate ?? lastLikeDate.value;
                wealthHistory.value = (cloudData.wealthHistory || []).map(r => ({ ...r, time: new Date(r.time) }));
                unlockedWorks.value = cloudData.unlockedWorks ?? unlockedWorks.value;
                workCooldowns.value = cloudData.workCooldowns ?? workCooldowns.value;
                workLevel.value = cloudData.workLevel ?? workLevel.value;
                workExp.value = cloudData.workExp ?? workExp.value;
                ownedStaff.value = cloudData.ownedStaff ?? ownedStaff.value;
                oilPosition.value = cloudData.oilPosition ?? oilPosition.value;
                oilEntryPrice.value = cloudData.oilEntryPrice ?? oilEntryPrice.value;
                // 立即保存合并后的数据
                save();
              }
            }
          } catch (e) {
            console.error('Firebase 加载失败:', e);
          }
        })();
      }
    }

    function startOilFutures() {
      if (oilInterval) clearInterval(oilInterval);
      oilInterval = setInterval(() => {
        // Simulate oil price change
        const momentum = oilTrend.value;
        const volatility = 0.02 + Math.random() * 0.03;
        const change = momentum * volatility * (Math.random() > 0.45 ? 1 : -1);
        oilPrice.value = Math.max(20, Math.min(200, oilPrice.value * (1 + change)));
        // Update trend
        if (Math.random() < 0.3) oilTrend.value = change > 0 ? 1 : -1;
        // Keep history
        oilHistory.value.push(oilPrice.value);
        if (oilHistory.value.length > 100) oilHistory.value.shift();
      }, 2000);
    }

    function updateCooldowns() {
      const now = Date.now();
      workCD.value = Math.max(0, 60 - Math.floor((now - lastWorkTime.value) / 1000));
      businessCD.value = Math.max(0, 600 - Math.floor((now - lastBusinessTime.value) / 1000));
      investCD.value = Math.max(0, 3600 - Math.floor((now - lastInvestTime.value) / 1000));

      // Check expired cooldowns → reset
      if (lastWorkTime.value > 0 && workCD.value === 0 && now - lastWorkTime.value >= 60000) lastWorkTime.value = 0;
      if (lastBusinessTime.value > 0 && businessCD.value === 0 && now - lastBusinessTime.value >= 600000) lastBusinessTime.value = 0;
      if (lastInvestTime.value > 0 && investCD.value === 0 && now - lastInvestTime.value >= 3600000) lastInvestTime.value = 0;
    }

    function fmtCD(seconds) {
      if (seconds <= 0) return '';
      if (seconds >= 3600) return `${Math.floor(seconds / 3600)}h ${Math.floor((seconds % 3600) / 60)}m`;
      if (seconds >= 60) return `${Math.floor(seconds / 60)}m ${seconds % 60}s`;
      return `${seconds}s`;
    }

    function fmtOilPrice(price) {
      return price.toFixed(2);
    }

    function doWork() {
      if (!canWork.value) return;
      cash.value += 1000;
      lastWorkTime.value = Date.now();
      workCount.value++;
      addWealthRecord();
      showFloatingText('+1,000', 'gain');
      playSound('coin');
      checkDailyTasks();
      checkAchievements();
      save();
      showToast('工作赚了 +1,000 迪拉姆! 💼', 'success');
    }

    // ============ WORK V2.0 FUNCTIONS ============
    function doWorkV2(workId, skipLock = false) {
      // Prevent rapid clicking - 500ms lock (skip for overtime mode)
      if (!skipLock && workClickLock.value) return;
      if (!skipLock) {
        workClickLock.value = true;
        setTimeout(() => { workClickLock.value = false; }, 500);
      }

      const work = WORK_TYPES_V2.find(w => w.id === workId);
      if (!work) return;

      // Check if unlocked
      if (!unlockedWorks.value.includes(workId)) {
        showToast('未解锁该工作类型!', 'error');
        return;
      }

      // Check cooldown - return if still on cooldown
      const cd = getWorkCooldown(workId);
      const cooldownEnd = workCooldowns.value[workId] || 0;
      if (cd > 0 && Date.now() < cooldownEnd) {
        return; // Still on cooldown
      }

      // Calculate earnings
      const earnings = getWorkEarnings(workId);

      // Apply earnings
      cash.value += earnings;
      workCount.value++;

      // Set cooldown AFTER earning (not before!)
      if (cd > 0) {
        workCooldowns.value[workId] = Date.now() + cd * 1000;
      }

      // Add work exp
      workExp.value++;
      checkWorkLevelUp();

      // Check for new work unlocks
      checkWorkUnlocks();

      // Combo system
      updateCombo();

      // Contact system (15% trigger)
      triggerContact();

      // Effects
      addWealthRecord();
      const comboText = comboDisplay.value.count >= 3 ? ` 🔥×${comboDisplay.value.count}` : '';
      showFloatingText(`+${fmtFull(earnings)}${comboText}`, 'gain');
      playSound('coin');
      checkDailyTasks();
      checkAchievements();
      save();
    }

    function checkWorkLevelUp() {
      const nextLevel = WORK_LEVEL_CONFIG.find(l => l.level === workLevel.value + 1);
      if (nextLevel && workExp.value >= nextLevel.exp) {
        workLevel.value = nextLevel.level;
        showToast(`打工升级! Lv.${workLevel.value} - ${nextLevel.unlock || ''}`, 'success');
        playSound('levelup');
      }
    }

    function checkWorkUnlocks() {
      const assets = totalAssets.value;
      for (const work of WORK_TYPES_V2) {
        if (assets >= work.unlock && !unlockedWorks.value.includes(work.id)) {
          unlockedWorks.value.push(work.id);
          showToast(`新工作解锁: ${work.name}!`, 'success');
        }
      }
    }

    function updateCombo() {
      const now = Date.now();
      // If last click was more than 2 seconds ago, reset combo
      if (lastWorkClick.value && now - lastWorkClick.value > 2000) {
        comboCount.value = 1; // Reset to 1, not 0
      } else {
        comboCount.value++;
      }
      lastWorkClick.value = now;

      // TODO: VIP功能 - 加班模式(自动工作)
      // if (comboCount.value >= 10 && !overtimeMode.value) {
      //   startOvertime();
      // }
    }

    function startOvertime() {
      overtimeMode.value = true;
      if (overtimeInterval) clearInterval(overtimeInterval);
      // Auto-work every second (skip lock for overtime)
      overtimeInterval = setInterval(() => {
        if (overtimeMode.value && unlockedWorks.value.length > 0) {
          // Auto click the highest unlocked work
          const highestWork = [...availableWorks.value].reverse().find(w => w.unlocked);
          if (highestWork) {
            doWorkV2(highestWork.id, true); // skipLock = true
          }
        }
      }, 1000);
    }

    function stopOvertime() {
      overtimeMode.value = false;
      comboCount.value = 0;
      if (overtimeInterval) {
        clearInterval(overtimeInterval);
        overtimeInterval = null;
      }
    }

    function triggerContact() {
      if (Math.random() > 0.15) return; // 15% trigger rate

      // Pick random contact based on probability
      let roll = Math.random();
      let cumulative = 0;
      for (const contact of CONTACTS) {
        cumulative += contact.probability;
        if (roll <= cumulative) {
          // Check if already have this permanent buff
          const existing = activeContacts.value.find(c => c.id === contact.id);
          if (existing) {
            if (existing.permanent) return; // Already have permanent
            // For non-permanent, can stack up to 3 times (oil baron)
          }

          const newContact = {
            id: contact.id,
            buff: contact.buff,
            buffValue: contact.buffValue,
            remaining: contact.permanent ? null : contact.remaining,
            permanent: contact.permanent || false,
          };

          // Special handling for mystery merchant - instant reward
          if (contact.id === 'mystery') {
            const reward = Math.floor(Math.random() * 99000) + 1000; // 1000-100000
            cash.value += reward;
            showFloatingText(`+${fmtFull(reward)} 🎭`, 'gain');
            playSound('coin');
            showToast(`神秘商人赠送 ${fmtFull(reward)} AED!`, 'success');
          } else {
            activeContacts.value.push(newContact);
            showToast(`人脉触发: ${contact.name}! ${contact.desc}`, 'success');
          }
          break;
        }
      }
    }

    function useContactBuff(contactId) {
      const idx = activeContacts.value.findIndex(c => c.id === contactId);
      if (idx < 0) return;
      const contact = activeContacts.value[idx];

      if (contact.permanent) return;

      contact.remaining--;
      if (contact.remaining <= 0) {
        activeContacts.value.splice(idx, 1);
      }
    }

    // ============ STAFF FUNCTIONS ============
    function buyStaff(staffId) {
      const price = getStaffPrice(staffId);
      if (cash.value < price) {
        showToast('现金不够!', 'error');
        return;
      }
      cash.value -= price;
      ownedStaff.value[staffId] = (ownedStaff.value[staffId] || 0) + 1;
      totalSpent.value += price;
      playSound('buy');
      checkAchievements();
      save();
      showToast(`雇佣了员工!`, 'success');
    }

    function startStaffIncome() {
      if (staffInterval) clearInterval(staffInterval);
      staffInterval = setInterval(() => {
        if (staffIncomePerSec.value > 0) {
          cash.value += staffIncomePerSec.value;
        }
      }, 1000);
    }

    function doBusiness() {
      if (!canBusiness.value) return;
      cash.value += 10000;
      lastBusinessTime.value = Date.now();
      businessCount.value++;
      addWealthRecord();
      showFloatingText('+10,000', 'gain');
      playSound('coin');
      checkDailyTasks();
      checkAchievements();
      save();
      showToast('做生意赚了 +10,000 迪拉姆! 🛒', 'success');
    }

    function doInvest() {
      if (!canInvest.value) return;
      modal.value = { type: 'invest-confirm' };
    }

    function confirmInvest() {
      modal.value = null;
      lastInvestTime.value = Date.now();
      investCount.value++;
      addWealthRecord();
      checkDailyTasks();
      const won = Math.random() < 0.5;
      if (won) {
        cash.value += 1000000;
        showFloatingText('+1,000,000', 'gain');
        playSound('invest_win');
        save();
        modal.value = { type: 'invest-result', won: true };
      } else {
        const loss = Math.floor(cash.value * 0.5);
        cash.value -= loss;
        showFloatingText('-' + fmtFull(loss), 'loss');
        playSound('invest_loss');
        save();
        modal.value = { type: 'invest-result', won: false, loss };
      }
      checkAchievements();
    }

    function buyOil(position) {
      if (oilPosition.value) return;
      oilPosition.value = position;
      oilEntryPrice.value = oilPrice.value;
    }

    function closeOilPosition() {
      if (!oilPosition.value) return;
      const profit = oilPosition.value === 'long'
        ? oilPrice.value - oilEntryPrice.value
        : oilEntryPrice.value - oilPrice.value;
      const profitAED = Math.floor(profit * 1000); // Scale to AED
      if (profitAED >= 0) {
        cash.value += profitAED;
        showFloatingText('+' + fmt(profitAED), 'gain');
      } else {
        cash.value += profitAED;
        showFloatingText(fmt(profitAED), 'loss');
      }
      oilPosition.value = null;
      oilEntryPrice.value = 0;
      addWealthRecord();
      save();
    }

    function checkDailyTasks() {
      const today = new Date().toDateString();
      if (lastResetDate.value !== today) {
        // Reset daily tasks
        workCount.value = 0;
        businessCount.value = 0;
        investCount.value = 0;
        completedTasks.value = [];
        lastResetDate.value = today;
        save();
      }

      // Check task completion
      if (workCount.value >= 10 && !completedTasks.value.includes('work10')) {
        completedTasks.value.push('work10');
        cash.value += 5000;
        showToast('每日任务完成! 打工达人 +5,000', 'success');
      }
      if (businessCount.value >= 5 && !completedTasks.value.includes('biz5')) {
        completedTasks.value.push('biz5');
        cash.value += 20000;
        showToast('每日任务完成! 商业精英 +20,000', 'success');
      }
      if (investCount.value >= 1 && !completedTasks.value.includes('invest1')) {
        completedTasks.value.push('invest1');
        cash.value += 100000;
        showToast('每日任务完成! 石油大亨 +100,000', 'success');
      }
    }

    function checkAchievements() {
      const assets = totalAssets.value;
      const owned = ownedItems.value;

      // First Millionaire
      if (assets >= 1000000 && !unlockedAchievements.value.includes('first_million')) {
        unlockedAchievements.value.push('first_million');
        showAchievementUnlock.value = ACHIEVEMENTS[0];
        playSound('achievement');
        showToast('🏆 成就解锁: 百万富翁!', 'success');
      }
      // Car Owner
      if (owned.some(i => i.startsWith('car')) && !unlockedAchievements.value.includes('first_car')) {
        unlockedAchievements.value.push('first_car');
        showAchievementUnlock.value = ACHIEVEMENTS[1];
        playSound('achievement');
        showToast('🏆 成就解锁: 有车一族!', 'success');
      }
      // Property Owner
      if (owned.some(i => i.startsWith('home')) && !unlockedAchievements.value.includes('first_home')) {
        unlockedAchievements.value.push('first_home');
        showAchievementUnlock.value = ACHIEVEMENTS[2];
        playSound('achievement');
        showToast('🏆 成就解锁: 房产大亨!', 'success');
      }
      // PK King (5 wins)
      if (pkWins.value >= 5 && !unlockedAchievements.value.includes('pk_king')) {
        unlockedAchievements.value.push('pk_king');
        showAchievementUnlock.value = ACHIEVEMENTS[3];
        playSound('achievement');
        showToast('🏆 成就解锁: PK之王!', 'success');
      }
      // Big Spender (5M spent)
      if (totalSpent.value >= 5000000 && !unlockedAchievements.value.includes('big_spender')) {
        unlockedAchievements.value.push('big_spender');
        showAchievementUnlock.value = ACHIEVEMENTS[4];
        playSound('achievement');
        showToast('🏆 成就解锁: 挥金如土!', 'success');
      }
    }

    function buyItem(item) {
      if (ownedItems.value.includes(item.id)) return;
      if (cash.value < item.price) return;
      modal.value = { type: 'buy-confirm', item };
    }

    function confirmBuy() {
      const item = modal.value.item;
      if (cash.value < item.price || ownedItems.value.includes(item.id)) {
        modal.value = null;
        return;
      }
      cash.value -= item.price;
      totalSpent.value += item.price;
      ownedItems.value.push(item.id);
      addWealthRecord();
      showFloatingText('-' + fmtFull(item.price), 'loss');
      playSound('buy');
      save();
      checkAchievements();
      modal.value = null;
      showToast(`${item.icon} ${item.name} 购买成功！`, 'success');
    }

    function goShop() {
      view.value = 'shop';
      activeTab.value = 'home';
    }

    function goBack() {
      view.value = 'home';
    }

    // Friends
    function visitFriend(friend) {
      alert(`你去拜访了${friend.name}的家，欣赏了他们的收藏！🏠`);
    }

    function openGift(friend) {
      giftFriend.value = friend;
      modal.value = { type: 'gift-select' };
    }

    function sendGift(item) {
      if (!giftFriend.value) return;
      if (cash.value < item.price) {
        showToast('现金不够！', 'error');
        return;
      }
      cash.value -= item.price;
      if (!ownedItems.value.includes(item.id)) {
        ownedItems.value.push(item.id);
      }
      save();
      showToast(`🎁 送了 ${item.icon} ${item.name} 给 ${giftFriend.value.name}！`, 'success');
      modal.value = null;
      giftFriend.value = null;
    }

    function pkFriend(friend) {
      const win = totalAssets.value > friend.assets;
      if (win) {
        playerTitle.value = '小土豪';
        titleExpiry.value = Date.now() + 3 * 24 * 3600 * 1000;
        pkWins.value++;
        checkAchievements();
        save();
      }
      modal.value = { type: 'pk-result', win, friend };
    }

    // ============ SHARE POSTER ============
    function openSharePoster() {
      showSharePoster.value = true;
      setTimeout(() => generatePoster(), 100);
    }

    function generatePoster() {
      const canvas = document.createElement('canvas');
      canvas.width = 1080;
      canvas.height = 1920;
      const ctx = canvas.getContext('2d');

      // Gold gradient background
      const gradient = ctx.createLinearGradient(0, 0, 0, 1920);
      gradient.addColorStop(0, '#1a1208');
      gradient.addColorStop(0.5, '#2a1e0f');
      gradient.addColorStop(1, '#1a1208');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 1080, 1920);

      // Decorative pattern (dots)
      ctx.fillStyle = 'rgba(212, 175, 55, 0.05)';
      for (let i = 0; i < 50; i++) {
        for (let j = 0; j < 90; j++) {
          if ((i + j) % 3 === 0) {
            ctx.beginPath();
            ctx.arc(i * 22 + 11, j * 22 + 11, 2, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      // Dubai skyline silhouette
      ctx.fillStyle = '#0a0805';
      const skyline = () => {
        const buildings = [
          { x: 0, w: 120, h: 400 },
          { x: 100, w: 80, h: 600 },
          { x: 170, w: 60, h: 350 },
          { x: 220, w: 100, h: 700 },
          { x: 310, w: 50, h: 300 },
          { x: 350, w: 80, h: 550 },
          { x: 420, w: 60, h: 280 },
          { x: 470, w: 90, h: 480 },
          { x: 550, w: 70, h: 380 },
          { x: 610, w: 100, h: 650 },
          { x: 700, w: 60, h: 320 },
          { x: 750, w: 80, h: 500 },
          { x: 820, w: 70, h: 420 },
          { x: 880, w: 90, h: 580 },
          { x: 960, w: 120, h: 350 },
        ];
        ctx.beginPath();
        ctx.moveTo(0, 1920);
        buildings.forEach(b => {
          ctx.lineTo(b.x, 1920 - b.h);
          ctx.lineTo(b.x + b.w, 1920 - b.h);
        });
        ctx.lineTo(1080, 1920);
        ctx.closePath();
        ctx.fill();
      };
      skyline();

      // Burj Khalifa (tallest)
      ctx.fillStyle = '#0a0805';
      ctx.beginPath();
      ctx.moveTo(500, 1920 - 800);
      ctx.lineTo(520, 1920 - 850);
      ctx.lineTo(540, 1920 - 820);
      ctx.lineTo(560, 1920 - 880);
      ctx.lineTo(580, 1920 - 850);
      ctx.lineTo(600, 1920 - 800);
      ctx.closePath();
      ctx.fill();

      // Game logo
      ctx.fillStyle = '#D4AF37';
      ctx.font = 'bold 80px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('🏰', 540, 280);

      // Title
      ctx.fillStyle = '#D4AF37';
      ctx.font = 'bold 72px sans-serif';
      ctx.fillText(LANG_DATA[currentLang.value]?.startTitle?.replace('\n', ' ') || 'ARAB TYCOON', 540, 400);

      ctx.fillStyle = '#F0D060';
      ctx.font = '36px sans-serif';
      ctx.fillText(LANG_DATA[currentLang.value]?.startSub?.split('\n')[0] || 'Start with 1,000 AED', 540, 480);

      // Main wealth display
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 90px sans-serif';
      const assetsText = fmtFull(totalAssets.value) + ' AED';
      ctx.fillText(assetsText, 540, 700);

      ctx.fillStyle = '#D4AF37';
      ctx.font = '36px sans-serif';
      ctx.fillText(LANG_DATA[currentLang.value]?.totalAssets || 'TOTAL ASSETS', 540, 780);

      // Level badge
      ctx.fillStyle = level.value.color || '#D4AF37';
      ctx.strokeStyle = level.value.color || '#D4AF37';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.roundRect(340, 850, 400, 80, 40);
      ctx.stroke();
      ctx.fillStyle = 'rgba(212, 175, 55, 0.1)';
      ctx.fill();
      ctx.fillStyle = level.value.color || '#D4AF37';
      ctx.font = 'bold 40px sans-serif';
      ctx.fillText(level.value.name, 540, 908);

      // Ranking info
      const rank = leaderboard.value.findIndex(l => l.isYou) + 1;
      ctx.fillStyle = '#F0D060';
      ctx.font = '36px sans-serif';
      ctx.fillText(`🏆 ${LANG_DATA[currentLang.value]?.leaderboard || 'RANKING'} #${rank}`, 540, 1050);

      // Divider
      ctx.strokeStyle = 'rgba(212, 175, 55, 0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(140, 1100);
      ctx.lineTo(940, 1100);
      ctx.stroke();

      // Owned items showcase
      if (ownedItemsList.value.length > 0) {
        ctx.fillStyle = '#D4AF37';
        ctx.font = 'bold 32px sans-serif';
        ctx.fillText(LANG_DATA[currentLang.value]?.ownedItems || 'MY ASSETS', 540, 1180);

        const topItems = ownedItemsList.value.slice(0, 6);
        const itemSize = 120;
        const startX = 540 - (topItems.length * itemSize) / 2 + itemSize / 2;
        topItems.forEach((item, i) => {
          const x = startX + i * itemSize;
          ctx.font = '60px sans-serif';
          ctx.fillText(item.icon, x, 1300);
        });
      }

      // Bottom branding
      ctx.fillStyle = '#D4AF37';
      ctx.font = 'bold 32px sans-serif';
      ctx.fillText('🌴 Arab Tycoon Simulator 🌴', 540, 1700);

      ctx.fillStyle = '#888';
      ctx.font = '24px sans-serif';
      ctx.fillText('Play Now: arabtycoon.com', 540, 1780);

      // Watermark
      ctx.fillStyle = 'rgba(212, 175, 55, 0.3)';
      ctx.font = '20px sans-serif';
      ctx.fillText(new Date().getFullYear() + ' © All Rights Reserved', 540, 1860);

      posterCanvas.value = canvas;
    }

    function downloadPoster() {
      if (!posterCanvas.value) return;
      const link = document.createElement('a');
      link.download = 'my-wealth-arab-tycoon.png';
      link.href = posterCanvas.value.toDataURL('image/png');
      link.click();
      showToast('海报已保存! 📸', 'success');
    }

    async function shareToWhatsApp() {
      if (!posterCanvas.value) return;
      const blob = await new Promise(resolve => posterCanvas.value.toBlob(resolve, 'image/png'));
      const file = new File([blob], 'my-wealth-arab-tycoon.png', { type: 'image/png' });

      if (navigator.share && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            files: [file],
            title: '阿拉伯土豪模拟器',
            text: `我的总资产: ${fmtFull(totalAssets.value)} AED! 快来挑战我! 🏆`
          });
          showToast('分享成功! 📤', 'success');
        } catch (e) {
          if (e.name !== 'AbortError') {
            downloadPoster();
          }
        }
      } else if (navigator.share) {
        try {
          await navigator.share({
            title: '阿拉伯土豪模拟器',
            text: `我的总资产: ${fmtFull(totalAssets.value)} AED! 快来挑战我! 🏆`
          });
          showToast('链接已分享! 📤', 'success');
        } catch (e) {
          if (e.name !== 'AbortError') {
            downloadPoster();
          }
        }
      } else {
        downloadPoster();
      }
    }

    // ============ GIFT ANIMATION ============
    function playGiftAnimation(friend, item) {
      const emojis = ['🎁', '💝', '🎊', '✨', item.icon];
      for (let i = 0; i < 15; i++) {
        const particle = document.createElement('div');
        particle.className = 'gift-particle';
        particle.textContent = emojis[i % emojis.length];
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 0.5 + 's';
        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 2500);
      }

      // Show notification to friend (simulated)
      const notif = {
        id: Date.now(),
        friend: friend.name,
        item: item.name,
        icon: item.icon
      };
      giftNotifications.value.push(notif);
      setTimeout(() => {
        giftNotifications.value = giftNotifications.value.filter(n => n.id !== notif.id);
      }, 3000);
    }

    function sendGiftAnim(item) {
      if (!giftFriend.value) return;
      if (cash.value < item.price) {
        showToast('现金不够！', 'error');
        return;
      }
      cash.value -= item.price;
      totalSpent.value += item.price;
      // For fixed gifts, don't add to inventory, just play animation
      playGiftAnimation(giftFriend.value, item);
      checkAchievements(); // Check for generous achievement
      save();
      showToast(`🎁 送了 ${item.icon} ${item.name} 给 ${giftFriend.value.name}！`, 'success');
      modal.value = null;
      giftFriend.value = null;
    }

    // ============ MULTIPLAYER PK ============
    function openMultiplayerPK() {
      modal.value = { type: 'multiplayer-pk' };
    }

    function startPKMatch(opponent) {
      pkMatchOpponent.value = opponent;
      showPKMatch.value = true;
      pkSearching.value = true;

      // Simulate matching delay
      setTimeout(() => {
        pkSearching.value = false;
        executePK();
      }, 2000);
    }

    function executePK() {
      const myAssets = totalAssets.value;
      const oppAssets = pkMatchOpponent.value.assets;
      const win = myAssets > oppAssets;

      if (win) {
        playerTitle.value = 'PK冠军';
        titleExpiry.value = Date.now() + 24 * 3600 * 1000;
        pkWins.value++;
        checkAchievements();
        save();
      }

      pkResultShow.value = {
        win,
        opponent: pkMatchOpponent.value,
        myAssets,
        oppAssets
      };
    }

    function closePKResult() {
      showPKMatch.value = false;
      pkResultShow.value = null;
      pkMatchOpponent.value = null;
      modal.value = null;
    }

    // Watch for level changes to trigger level-up overlay
    let prevLevelIndex = LEVELS.findIndex(l => l.name === level.value.name);
    watch(totalAssets, () => {
      const newLevel = getLevel(totalAssets.value);
      const newIndex = LEVELS.findIndex(l => l.name === newLevel.name);
      if (newIndex > prevLevelIndex) {
        triggerLevelUp(newLevel);
      }
      prevLevelIndex = newIndex;
    });

    onUnmounted(() => {
      if (cdInterval) clearInterval(cdInterval);
      if (toastTimer) clearTimeout(toastTimer);
    });

    return {
      started, activeTab, shopTab, lbTab, view,
      cash, ownedItems, totalAssets, level, nextLevel, levelProgress, displayTitle,
      workCD, businessCD, investCD, canWork, canBusiness, canInvest,
      leaderboard, leaderboardByCategory, friends, ownedItemsList, currentShopItems,
      dailyTaskProgress, allDailyTasksDone, achievementsWithStatus,
      modal, toast, giftFriend, dailyTasksTab,
      showAchievementUnlock,
      fmt, fmtFull, fmtCD, fmtOilPrice, getLevel,
      currentLang, isRtl, t,
      startGame, goShop, goBack,
      doWork, doBusiness, doInvest,
      confirmInvest,
      buyItem, confirmBuy,
      visitFriend, openGift, sendGift, pkFriend,
      openSharePoster, downloadPoster, shareToWhatsApp,
      sendGiftAnim,
      openMultiplayerPK, startPKMatch, closePKResult,
      showSharePoster, posterCanvas,
      giftNotifications,
      showPKMatch, pkMatchOpponent, pkResultShow, pkSearching,
      AI_OPPONENTS,
      // Territory System
      ownedTerritories, territoriesTab, territories, lordRanks: LORD_RANKS,
      buyTerritory, getLordRank, getLordRankBonus, getTerritoryIncome, collectRentalIncome, rentalIncome, rentalEnabled,
      // Daily Signin
      signinRewards: SIGNIN_REWARDS, lastSigninDate, signinHistory, canSignin, getSigninDay, doSignin, hasSignedOnDay,
      // Charity
      charityOptions: CHARITY_OPTIONS, charityTotal, doCharity,
      // Friend Profile
      viewingFriend, visitFriendProfile, closeFriendProfile, likeFriend, likedFriends,
      // Fixed Gifts
      fixedGifts: FIXED_GIFTS,
      // Sound System
      soundEnabled, toggleSound,
      // Floating Text
      floatingTexts,
      // Level Up Overlay
      showLevelUpOverlay, levelUpData,
      // Wealth Chart
      wealthHistory, getWealthChartData,
      // Work System v2
      workClickLock, showStaff, showOilFutures,
      workLevel, workExp, comboCount, comboDisplay,
      availableWorks, workCooldowns, unlockedWorks,
      currentWorkLevelConfig, workLevelProgress,
      activeContacts, activeContactsDisplay,
      getWorkEarnings, getWorkCooldown,
      doWorkV2, overtimeMode, startOvertime, stopOvertime,
      // Oil Futures
      oilPrice, oilTrend, oilPosition, oilEntryPrice, oilProfitLoss, oilPositionValue, oilHistory, oilTrendClass,
      buyOil, closeOilPosition, startOilFutures,
      // Staff
      ownedStaffList, ownedStaff, buyStaff, staffIncomePerSec, getStaffPrice,
    };
  },
  template: `

</div>

    <div class="status-bar" v-if="view === 'home'">

        </div>
        <div style="text-align:right">
          <div class="status-label">身份</div>

        <div class="work-v2-footer">
          <button class="work-footer-btn" @click="showStaff = true">👥 员工 ({{ ownedStaffList.length }})</button>
          <button class="work-footer-btn" @click="showOilFutures = true">🛢️ 石油期货</button>
        </div>
      </div>

      <!-- Wealth Chart -->
      <div class="wealth-chart-section" v-if="wealthHistory.length > 0">
        <div class="wealth-chart-title">
          <span>📈 财富增长</span>
          <span style="font-size:10px;color:var(--text-dim)">最近{{ wealthHistory.length }}条记录</span>
        </div>
        <div class="wealth-chart-container">
          <div v-for="(bar, idx) in getWealthChartData()" :key="idx"
            class="wealth-bar"
            :style="{ height: bar.height + '%' }"
            :data-value="fmt(bar.value)">
          </div>
        </div>
      </div>

      <!-- Owned Items -->
      <div class="section-title">🛍️ 已拥有物品</div>
      <div class="owned-list">
        <div v-if="ownedItemsList.length === 0" class="empty-msg">还没有物品，去商店逛逛吧！</div>
        <div v-for="item in ownedItemsList" :key="item.id" class="owned-item">
          <span class="item-icon">{{ item.icon }}</span>
          <span class="item-name">{{ item.name }}</span>
        </div>
      </div>

      <!-- Daily Signin -->
      <div class="section-title">📅 每日签到</div>
      <div class="signin-grid">
        <div v-for="(reward, idx) in signinRewards" :key="idx"
          :class="'signin-day ' + (hasSignedOnDay(reward.day) ? 'checked' : '') + (idx === getSigninDay() - 1 && canSignin() ? ' today' : '')"
          :style="hasSignedOnDay(reward.day) ? 'background:#1a3a1a;border-color:#4caf50' : ''">
          <div class="signin-day-icon">{{ reward.icon }}</div>
          <div class="signin-day-label">第{{ reward.day }}天</div>
          <div class="signin-reward">+{{ fmtFull(reward.reward) }}</div>
        </div>
      </div>
      <button v-if="canSignin()" class="btn-gold" style="width:100%;margin:10px 0;padding:12px" @click="doSignin">
        🎁 立即签到领取 {{ fmtFull(signinRewards[getSigninDay() - 1].reward) }} AED
      </button>
      <div v-else style="text-align:center;color:var(--text-dim);font-size:12px;margin:10px 0">
        今日已签到 ✅ 明天再来吧！
      </div>

      <!-- Property Rental Income -->
      <div class="rental-section" v-if="ownedTerritories.length > 0">
        <div class="rental-header">
          <div class="rental-title">🏜️ 领地收租</div>
          <button :class="'rental-toggle ' + (rentalEnabled ? 'on' : 'off')" @click="rentalEnabled = !rentalEnabled">
            {{ rentalEnabled ? '自动' : '手动' }}
          </button>
        </div>
        <div class="rental-income">
          <div>每Tick收入: <span class="rental-amount">+{{ fmtFull(getTerritoryIncome()) }} AED</span></div>
          <button class="btn-gold" style="width:100%;margin-top:10px;padding:10px;font-size:13px" @click="collectRentalIncome">
            💰 领取领地收入
          </button>
        </div>
      </div>

      <!-- Charity System -->
      <div class="charity-section">
        <div class="charity-title">🤝 慈善捐赠</div>
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:10px">
          捐赠可获得额外奖励！累计捐赠: {{ fmtFull(charityTotal) }} AED
        </div>
        <div class="charity-options">
          <button v-for="opt in charityOptions" :key="opt.id"
            :class="'charity-btn ' + opt.id.replace('charity_', '')"
            :style="cash < opt.amount ? 'opacity:0.5;cursor:not-allowed' : ''"
            :disabled="cash < opt.amount"
            @click="doCharity(opt)">
            <div>{{ opt.icon }}</div>
            <div>{{ opt.name }}</div>
            <div style="font-size:10px;color:var(--gold)">-{{ fmtFull(opt.amount) }}</div>
            <div style="font-size:10px;color:var(--green)">+{{ fmtFull(opt.bonus) }}</div>
          </button>
        </div>
      </div>
    </div>

    <!-- Tab: Leaderboard (inline) -->
    <div class="tab-content" v-if="activeTab === 'leaderboard'">
      <div class="lb-tabs">
        <div v-for="cat in ['总资产','汽车','房产','宠物','奢侈品']" :key="cat"
          :class="'lb-tab ' + (lbTab === cat ? 'active' : '')"
          @click="lbTab = cat">{{ cat }}</div>
      </div>
      <div class="lb-list">
        <div v-for="row in leaderboardByCategory" :key="row.name" class="lb-row" :class="{ 'is-you': row.isYou }">
          <div :class="'lb-rank ' + (row.rank === 1 ? 'gold' : row.rank === 2 ? 'silver' : row.rank === 3 ? 'bronze' : '')">
            {{ row.rank <= 3 ? ['🥇','🥈','🥉'][row.rank-1] : '#' + row.rank }}
          </div>
          <div class="lb-emoji">{{ row.emoji }}</div>
          <div class="lb-info">
            <div class="lb-name">{{ row.name }}{{ row.isYou ? ' (你)' : '' }}</div>
            <span :class="'identity-badge ' + getLevel(row.assets).class" style="font-size:10px">
              {{ getLevel(row.assets).name }}
            </span>
          </div>
          <div class="lb-assets">{{ fmtFull(row.assets) }} AED</div>
        </div>
      </div>
    </div>

    <!-- Tab: Friends (inline) -->
    <div class="tab-content" v-if="activeTab === 'friends'">
      <div class="friends-list">
        <div v-for="friend in friends" :key="friend.id" class="friend-card">
          <div class="friend-top">
            <div class="friend-avatar">{{ friend.emoji }}</div>
            <div class="friend-info">
              <div class="friend-name">{{ friend.name }}</div>
              <div class="friend-assets">{{ fmtFull(friend.assets) }} AED</div>
              <span :class="'identity-badge ' + friend.level.class" style="font-size:10px">{{ friend.level.name }}</span>
            </div>
          </div>
          <div class="friend-actions">
            <button class="friend-action-btn btn-visit" @click="visitFriendProfile(friend)">拜访</button>
            <button class="friend-action-btn btn-gift" @click="openGift(friend)">送礼</button>
            <button class="friend-action-btn btn-pk" @click="pkFriend(friend)">PK</button>
          </div>
          <button class="friend-action-btn" style="width:100%;margin-top:8px;background:#2a1a3a;border-color:#7a4aaa;color:#b87ae8" @click="openMultiplayerPK">⚔️ 多人PK</button>
        </div>
      </div>

      <!-- Multiplayer PK Section -->
      <div class="multiplayer-section">
        <div class="section-divider"></div>
        <div class="section-title">⚔️ 多人PK挑战</div>
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:12px">与AI对手进行财富对决</div>
        <div v-for="opp in AI_OPPONENTS" :key="opp.id" class="ai-opponent-card">
          <div style="font-size:36px">{{ opp.emoji }}</div>
          <div class="ai-opponent-info">
            <div class="ai-opponent-name">{{ opp.name }}</div>
            <div class="ai-opponent-assets">{{ fmtFull(opp.assets) }} AED</div>
          </div>
          <button class="btn-challenge" @click="startPKMatch(opp)">挑战</button>
        </div>
      </div>
    </div>

    <!-- Tab: Tasks & Achievements -->
    <div class="tab-content" v-if="activeTab === 'tasks'">
      <div class="tabs" style="margin-bottom:15px">
        <div :class="'lb-tab ' + (dailyTasksTab === 'tasks' ? 'active' : '')" @click="dailyTasksTab = 'tasks'">每日任务</div>
        <div :class="'lb-tab ' + (dailyTasksTab === 'achievements' ? 'active' : '')" @click="dailyTasksTab = 'achievements'">成就</div>
      </div>

      <!-- Daily Tasks -->
      <div v-if="dailyTasksTab === 'tasks'">
        <div v-for="task in dailyTaskProgress" :key="task.id" style="background:#1e1a14;padding:12px;margin:8px 0;border-radius:10px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span style="font-size:20px">{{ task.done ? '✅' : '📋' }}</span>
            <div style="flex:1">
              <div style="font-weight:bold">{{ currentLang === 'cn' ? task.name : currentLang === 'en' ? task.nameEn : task.nameAr }}</div>
              <div style="font-size:12px;color:#a09080">{{ currentLang === 'cn' ? task.desc : currentLang === 'en' ? task.desc : task.desc }}</div>
            </div>
            <span style="color:#D4AF37;font-weight:bold">+{{ fmtFull(task.reward) }}</span>
          </div>
          <div style="background:#333;border-radius:5px;height:6px;overflow:hidden">
            <div :style="'width:' + (task.progress / task.target * 100) + '%;height:100%;background:' + (task.done ? '#4caf50' : '#D4AF37') + ';transition:width 0.3s'"></div>
          </div>
          <div style="font-size:11px;color:#a09080;margin-top:4px;text-align:right">{{ task.progress }}/{{ task.target }}</div>
        </div>
      </div>

      <!-- Achievements -->
      <div v-if="dailyTasksTab === 'achievements'">
        <div v-for="ach in achievementsWithStatus" :key="ach.id" :style="ach.unlocked ? 'background:#1e1a14;padding:12px;margin:8px 0;border-radius:10px' : 'background:#1e1a14;padding:12px;margin:8px 0;border-radius:10px;opacity:0.5'">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:28px">{{ ach.unlocked ? ach.icon : '🔒' }}</span>
            <div style="flex:1">
              <div style="font-weight:bold">{{ currentLang === 'cn' ? ach.name : currentLang === 'en' ? ach.nameEn : ach.nameAr }}</div>
              <div style="font-size:12px;color:#a09080">{{ ach.desc }}</div>
            </div>
            <span v-if="ach.unlocked" style="color:#4caf50">已解锁</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Tab: Territory / Lord System -->
    <div class="tab-content" v-if="activeTab === 'territory'">
      <!-- Lord Rank Display -->
      <div :class="'lord-rank-card ' + (getLordRank().id !== 'lord_commoner' ? 'current' : '')" style="margin-bottom:15px">
        <div style="font-size:48px">{{ getLordRank().icon }}</div>
        <div class="lord-rank-info">
          <div class="lord-rank-name">{{ getLordRank().name }}</div>
          <div class="lord-rank-req">领地价值: {{ fmtFull(ownedTerritories.reduce((sum, tId) => { const t = territories.find(ter => ter.id === tId); return sum + (t ? t.price : 0); }, 0)) }} AED</div>
          <div class="lord-rank-reward">{{ getLordRank().bonus }}</div>
        </div>
      </div>

      <!-- Territory Stats -->
      <div class="territory-stats">
        <div class="territory-stat">
          <div class="territory-stat-value">{{ ownedTerritories.length }}</div>
          <div class="territory-stat-label">已拥有领土</div>
        </div>
        <div class="territory-stat">
          <div class="territory-stat-value">{{ fmtFull(getTerritoryIncome()) }}</div>
          <div class="territory-stat-label">每小时收入</div>
        </div>
        <div class="territory-stat">
          <div class="territory-stat-value">{{ lordRanks.findIndex(r => r.id === getLordRank().id) + 1 }}/5</div>
          <div class="territory-stat-label">领主等级</div>
        </div>
      </div>

      <!-- Territory Tabs -->
      <div class="tabs" style="margin-bottom:15px">
        <div :class="'lb-tab ' + (territoriesTab === 'territories' ? 'active' : '')" @click="territoriesTab = 'territories'">领土</div>
        <div :class="'lb-tab ' + (territoriesTab === 'ranks' ? 'active' : '')" @click="territoriesTab = 'ranks'">领主称号</div>
      </div>

      <!-- Territory Grid -->
      <div v-if="territoriesTab === 'territories'">
        <div class="territory-grid">
          <div v-for="ter in territories" :key="ter.id"
            :class="'territory-card ' + (ownedTerritories.includes(ter.id) ? 'owned' : '')"
            @click="!ownedTerritories.includes(ter.id) && buyTerritory(ter)">
            <div class="territory-icon">{{ ter.icon }}</div>
            <div class="territory-name">{{ currentLang === 'cn' ? ter.name : ter.nameEn }}</div>
            <div class="territory-income" v-if="!ownedTerritories.includes(ter.id)">+{{ fmtFull(ter.income) }}/h</div>
            <div class="territory-income" v-else style="color:var(--gold)">已拥有</div>
            <div v-if="!ownedTerritories.includes(ter.id)" class="territory-price">{{ fmtFull(ter.price) }} AED</div>
            <div v-else class="territory-owned-badge">领主</div>
          </div>
        </div>
      </div>

      <!-- Lord Ranks -->
      <div v-if="territoriesTab === 'ranks'">
        <div v-for="rank in lordRanks" :key="rank.id" :class="'lord-rank-card ' + (rank.id === getLordRank().id ? 'current' : '')">
          <div style="font-size:36px">{{ rank.icon }}</div>
          <div class="lord-rank-info">
            <div class="lord-rank-name">{{ rank.name }}</div>
            <div class="lord-rank-req">需要领地价值: {{ fmtFull(rank.territoryValue) }} AED</div>
            <div class="lord-rank-reward">效果: {{ rank.bonus }}</div>
          </div>
          <div v-if="rank.id === getLordRank().id" class="lord-rank-status unlocked">当前</div>
          <div v-else-if="rank.id !== 'lord_commoner' && (rank.territoryValue <= ownedTerritories.reduce((sum, tId) => { const t = territories.find(ter => ter.id === tId); return sum + (t ? t.price : 0); }, 0))" class="lord-rank-status unlocked">已解锁</div>
          <div v-else class="lord-rank-status locked">未解锁</div>
        </div>
      </div>
    </div>
  </template>

  <!-- ========== SHOP VIEW ========== -->
  <div v-if="view === 'shop'" style="padding:20px;color:#D4AF37">
    <div style="text-align:center;margin-bottom:15px">商店</div>
    <div style="display:flex;justify-content:center;gap:10px;margin-bottom:15px;flex-wrap:wrap">
      <span v-for="cat in ['汽车','房产','宠物','奢侈品']" :key="cat"
        :style="shopTab === cat ? 'padding:5px 12px;background:#D4AF37;color:#000;border-radius:20px;cursor:pointer' : 'padding:5px 12px;background:#333;color:#fff;border-radius:20px;cursor:pointer'"
        @click="shopTab = cat">{{ cat }}</span>
    </div>
    <div>
      <div v-for="item in currentShopItems" :key="item.id" style="background:#1e1a14;padding:12px;margin:8px 0;border-radius:10px;display:flex;align-items:center;gap:10px">
        <span style="font-size:28px">{{ item.icon }}</span>
        <div style="flex:1">
          <div style="font-weight:bold">{{ item.name }}</div>
          <div style="color:#D4AF37;font-size:12px">{{ fmtFull(item.price) }} 迪拉姆</div>
        </div>
        <button v-if="ownedItems.includes(item.id)" style="padding:6px 12px;background:#2a3a2a;color:#6caf6c;border:none;border-radius:15px;font-size:12px;cursor:default">已拥有</button>
        <button v-else-if="cash < item.price" style="padding:6px 12px;background:#333;color:#666;border:none;border-radius:15px;font-size:12px;cursor:not-allowed">买不起</button>
        <button v-else style="padding:6px 12px;background:#D4AF37;color:#000;border:none;border-radius:15px;font-size:12px;cursor:pointer" @click="buyItem(item)">购买</button>
      </div>
    </div>
  </div>

  <!-- Shop Button -->
  <div class="shop-btn-fixed" v-if="view === 'home'">
    <button class="btn-shop-main" @click="goShop">🛒 商店 — 购买汽车、房产、宠物和奢侈品</button>
  </div>

</div>

<!-- ========== MODAL ========== -->
<div v-if="modal" class="modal-overlay" @click.self="modal = null">

  <!-- Invest Confirm -->
  <div v-if="modal.type === 'invest-confirm'" class="modal">
    <div class="modal-icon">🛢️</div>
    <div class="modal-title">石油投资</div>
    <div class="modal-text">50%概率赢取 +1,000,000 迪拉姆<br>50%概率损失50%的现金<br><br>这是高风险投资！</div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" @click="modal = null">取消</button>
      <button class="modal-btn modal-btn-confirm" @click="confirmInvest">我了解</button>
    </div>
  </div>

  <!-- Invest Result -->
  <div v-if="modal.type === 'invest-result'" class="modal">
    <div class="modal-icon">{{ modal.won ? '💰' : '📉' }}</div>
    <div class="modal-title">{{ modal.won ? '你赢了!' : '你输了...' }}</div>
    <div class="modal-text">
      <template v-if="modal.won">油井喷金了！<br>+1,000,000 迪拉姆</template>
      <template v-else>投资失败了。<br>-{{ fmtFull(modal.loss) }} 迪拉姆</template>
    </div>
    <button class="modal-btn modal-btn-ok" @click="modal = null">确定</button>
  </div>

  <!-- Buy Confirm -->
  <div v-if="modal.type === 'buy-confirm'" class="modal">
    <div class="modal-icon">{{ modal.item.icon }}</div>
    <div class="modal-title">确认购买</div>
    <div class="modal-text">购买 <strong>{{ modal.item.name }}</strong><br>价格 <strong style="color:var(--gold)">{{ fmtFull(modal.item.price) }} 迪拉姆</strong>？</div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" @click="modal = null">取消</button>
      <button class="modal-btn modal-btn-confirm" @click="confirmBuy">购买</button>
    </div>
  </div>

  <!-- Gift Select -->
  <div v-if="modal.type === 'gift-select'" class="modal" style="max-width:380px">
    <div class="modal-icon">🎁</div>
    <div class="modal-title">送给 {{ giftFriend?.name }} 的礼物</div>
    <div class="modal-text">选择一件礼物送给他</div>
    <div class="gift-grid">
      <div v-for="gift in fixedGifts" :key="gift.id"
        class="gift-option"
        :class="{ disabled: cash < gift.price }"
        @click="cash >= gift.price && sendGiftAnim(gift)">
        <div class="gift-option-icon">{{ gift.icon }}</div>
        <div class="gift-option-name">{{ gift.name }}</div>
        <div class="gift-option-price">{{ fmtFull(gift.price) }} AED</div>
      </div>
    </div>
    <button class="modal-btn modal-btn-cancel" @click="modal = null; giftFriend = null" style="width:100%">取消</button>
  </div>

  <!-- PK Result -->
  <div v-if="modal.type === 'pk-result'" class="modal">
    <div class="modal-icon">{{ modal.win ? '🏆' : '😢' }}</div>
    <div class="modal-result" :class="modal.win ? 'result-win' : 'result-lose'">
      {{ modal.win ? '你赢了!' : '你输了!' }}
    </div>
    <div class="modal-text">
      <template v-if="modal.win">
        你比 {{ modal.friend.name }} 有钱！<br>你获得了称号：<strong style="color:var(--gold)">🏅 小土豪</strong><br>(有效期3天)
      </template>
      <template v-else>
        {{ modal.friend.name }} 比你有钱。<br>继续赚钱，再试试吧！
      </template>
    </div>
    <button class="modal-btn modal-btn-ok" @click="modal = null">确定</button>
  </div>

  <!-- Multiplayer PK -->
  <div v-if="modal.type === 'multiplayer-pk'" class="modal" style="max-width:380px">
    <div class="modal-icon">⚔️</div>
    <div class="modal-title">多人PK挑战</div>
    <div class="modal-text">选择对手进行财富对决</div>
    <div style="max-height:300px;overflow-y:auto">
      <div v-for="opp in AI_OPPONENTS" :key="opp.id" class="ai-opponent-card">
        <div style="font-size:36px">{{ opp.emoji }}</div>
        <div class="ai-opponent-info">
          <div class="ai-opponent-name">{{ opp.name }}</div>
          <div class="ai-opponent-assets">{{ fmtFull(opp.assets) }} AED</div>
        </div>
        <button class="btn-challenge" @click="startPKMatch(opp); modal = null">挑战</button>
      </div>
    </div>
    <button class="modal-btn modal-btn-cancel" @click="modal = null" style="width:100%;margin-top:12px">关闭</button>
  </div>

  <!-- Friend Profile View -->
  <div v-if="viewingFriend" class="friend-profile-overlay" style="position:fixed;inset:0;background:var(--bg);z-index:150;overflow-y:auto">
    <div class="friend-profile-header">
      <button class="back-btn" @click="closeFriendProfile" style="position:absolute;top:10px;left:10px">←</button>
      <div class="friend-profile-avatar">{{ viewingFriend.emoji }}</div>
      <div class="friend-profile-name">{{ viewingFriend.name }}</div>
      <span :class="'identity-badge ' + viewingFriend.level.class">{{ viewingFriend.level.name }}</span>
    </div>

    <div class="friend-profile-stats">
      <div class="friend-stat">
        <div class="friend-stat-value">{{ fmtFull(viewingFriend.assets) }}</div>
        <div class="friend-stat-label">总资产</div>
      </div>
      <div class="friend-stat">
        <div class="friend-stat-value">{{ viewingFriend.level.name }}</div>
        <div class="friend-stat-label">身份</div>
      </div>
    </div>

    <div class="friend-inventory-section" style="padding:10px">
      <div class="friend-inventory-title">🏠 {{ viewingFriend.name }} 的收藏</div>
      <div class="friend-inventory-grid">
        <div v-for="i in 6" :key="i" class="friend-inventory-item">
          <div class="friend-inventory-icon">{{ ['🚗','🏎️','🏠','🦅','💎','⌚'][i-1] }}</div>
          <div class="friend-inventory-name">{{ ['豪车','跑车','豪宅','猎鹰','钻石','名表'][i-1] }}</div>
        </div>
      </div>
    </div>

    <div style="padding:10px">
      <button class="like-btn" @click="likeFriend(viewingFriend)" :disabled="likedFriends.has(viewingFriend.id)">
        {{ likedFriends.has(viewingFriend.id) ? '已点赞 ✓' : '👍 点赞 (+50 AED)' }}
      </button>
      <button class="friend-action-btn btn-gift" style="width:100%;margin-top:10px" @click="openGift(viewingFriend)">🎁 送礼</button>
      <button class="friend-action-btn btn-pk" style="width:100%;margin-top:10px" @click="pkFriend(viewingFriend)">⚔️ PK挑战</button>
    </div>
  </div>

</div>

<!-- Level Up Overlay -->
<div v-if="showLevelUpOverlay" class="levelup-overlay">
  <div class="levelup-content">
    <div class="levelup-icon">🎉</div>
    <div class="levelup-text">升级!</div>
    <div class="levelup-title">{{ levelUpData?.name }}</div>
  </div>
</div>

<!-- Floating Texts -->
<div v-for="ft in floatingTexts" :key="ft.id"
  class="float-text"
  :class="ft.type"
  :style="{ left: ft.x + 'px', top: ft.y + 'px' }">
  {{ ft.text }}
</div>

<!-- Toast -->
<div v-if="toast" class="toast" :class="'toast-' + toast.type">{{ toast.msg }}</div>

<!-- ========== SHARE POSTER ========== -->
<div v-if="showSharePoster" class="share-poster-overlay" @click.self="showSharePoster = false">
  <div class="share-poster-preview">
    <canvas ref="posterCanvas" width="270" height="480" style="width:100%;height:auto;display:block"></canvas>
  </div>
  <div class="share-poster-actions">
    <button class="share-action-btn btn-whatsapp" @click="shareToWhatsApp">📤 WhatsApp</button>
    <button class="share-action-btn btn-download" @click="downloadPoster">💾 下载</button>
    <button class="share-action-btn btn-close-share" @click="showSharePoster = false">关闭</button>
  </div>
</div>

<!-- ========== GIFT ANIMATION ========== -->
<div v-if="giftNotifications.length > 0" class="gift-animation-overlay">
</div>
<div v-for="notif in giftNotifications" :key="notif.id" class="gift-notification">
  <span class="notif-icon">{{ notif.icon }}</span>
  <span class="notif-text">你收到了 {{ notif.friend }} 送的 {{ notif.item }}!</span>
</div>

<!-- ========== PK MATCHMAKING ========== -->
<div v-if="showPKMatch && pkSearching" class="pk-match-overlay">
  <div class="pk-match-title">⚔️ 匹配中</div>
  <div class="pk-spinner"></div>
  <div class="pk-match-text">正在匹配对手...</div>
</div>

<div v-if="pkResultShow" class="pk-result-overlay">
  <div class="pk-result-effect">{{ pkResultShow.win ? '🏆' : '😢' }}</div>
  <div class="pk-result-title" :class="pkResultShow.win ? 'pk-result-win' : 'pk-result-lose'">
    {{ pkResultShow.win ? '胜利!' : '失败...' }}
  </div>
  <div class="pk-vs-display">
    <div class="pk-player-card">
      <div class="pk-player-emoji">😎</div>
      <div class="pk-player-name">你</div>
      <div class="pk-player-assets">{{ fmtFull(pkResultShow.myAssets) }} AED</div>
    </div>
    <div class="pk-vs">VS</div>
    <div class="pk-player-card">
      <div class="pk-player-emoji">{{ pkResultShow.opponent.emoji }}</div>
      <div class="pk-player-name">{{ pkResultShow.opponent.name }}</div>
      <div class="pk-player-assets">{{ fmtFull(pkResultShow.oppAssets) }} AED</div>
    </div>
  </div>
  <div class="pk-result-assets" v-if="pkResultShow.win">
    🏅 获得称号: PK冠军 (24小时)
  </div>
  <button class="close-pk-btn" @click="closePKResult">确定</button>
</div>

<!-- ========== STAFF MODAL ========== -->
<div v-if="showStaff" class="modal-overlay" @click.self="showStaff = false">
  <div class="modal-content">
    <div class="modal-header">
      <h3>👥 员工管理</h3>
      <button class="modal-close" @click="showStaff = false">×</button>
    </div>
    <div class="staff-income" style="text-align:center;margin-bottom:16px;">
      每秒收入: <span style="color:var(--green)">+{{ fmt(staffIncomePerSec) }} AED/s</span>
    </div>
    <div class="staff-list">
      <div v-for="staff in STAFF_TYPES" :key="staff.id" class="staff-item">
        <span class="staff-icon">{{ staff.icon }}</span>
        <div class="staff-info">
          <div class="staff-name">{{ staff.name }} ({{ staff.nameEn }})</div>
          <div class="staff-income-rate">+{{ fmt(staff.incomePerSec) }} AED/s</div>
          <div class="staff-owned" v-if="ownedStaff[staff.id]">已拥有: {{ ownedStaff[staff.id] }}</div>
        </div>
        <div>
          <div class="staff-price">{{ fmt(getStaffPrice(staff.id)) }} AED</div>
          <button class="staff-buy-btn"
            :disabled="cash < getStaffPrice(staff.id)"
            @click="buyStaff(staff.id)">购买</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ========== OIL FUTURES MODAL ========== -->
<div v-if="showOilFutures" class="modal-overlay" @click.self="showOilFutures = false">
  <div class="modal-content">
    <div class="modal-header">
      <h3>🛢️ 石油期货</h3>
      <button class="modal-close" @click="showOilFutures = false">×</button>
    </div>
    <div class="oil-header">
      <span class="oil-title">当前价格</span>
      <span class="oil-price" :class="oilTrendClass">\${{ fmtOilPrice(oilPrice) }}</span>
    </div>
    <div class="oil-chart">
      <div v-for="(price, idx) in oilHistory.slice(-30)" :key="idx"
        class="oil-bar"
        :class="idx > 0 && price < oilHistory[idx-1] ? 'down' : ''"
        :style="{ height: oilHistory.length > 0 ? (price / Math.max(...oilHistory.slice(-30), 1) * 100) + '%' : '0%' }">
      </div>
    </div>
    <div class="oil-position">
      <span>持仓:</span>
      <span class="position-badge" :class="{
        'position-long': oilPosition === 'long',
        'position-short': oilPosition === 'short',
        'position-none': !oilPosition
      }">
        {{ oilPosition === 'long' ? '📈 做多' : oilPosition === 'short' ? '📉 做空' : '无持仓' }}
      </span>
      <span v-if="oilPosition && oilProfitLoss !== 0" class="oil-profit" :class="oilProfitLoss >= 0 ? 'positive' : 'negative'">
        {{ oilProfitLoss >= 0 ? '+' : '' }}{{ fmt(Math.abs(oilProfitLoss)) }} AED
      </span>
    </div>
    <div class="oil-buttons">
      <button v-if="!oilPosition" class="oil-btn buy" @click="buyOil('long')">📈 做多</button>
      <button v-if="!oilPosition" class="oil-btn sell" @click="buyOil('short')">📉 做空</button>
      <button v-if="oilPosition" class="oil-btn close" @click="closeOilPosition">平仓</button>
    </div>
  </div>
</div>

  `
}).mount('#app');
</script>
</body>
</html>
