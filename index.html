<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>阿拉伯土豪模拟器</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #D4AF37;
      --gold-light: #F0D060;
      --brown: #2C1E0F;
      --brown-light: #4A3520;
      --bg: #0a0a0a;
      --bg-card: #141210;
      --bg-card2: #1e1a14;
      --text: #f5f0e8;
      --text-dim: #a09080;
      --green: #4caf50;
      --blue: #42a5f5;
      --purple: #ab47bc;
      --gray: #9e9e9e;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans Arabic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      overflow-x: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--brown-light); border-radius: 2px; }

    /* ========== START SCREEN ========== */
    .start-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      background: radial-gradient(ellipse at top, #1a1208 0%, var(--bg) 70%);
    }

    .start-logo {
      font-size: 56px;
      margin-bottom: 12px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .start-title {
      font-size: 28px;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 1px;
      text-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .start-sub {
      font-size: 15px;
      color: var(--text-dim);
      margin-bottom: 48px;
      line-height: 1.6;
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--brown);
      border: none;
      padding: 16px 48px;
      font-size: 18px;
      font-weight: 800;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.5px;
    }

    .btn-gold:active { transform: scale(0.97); }

    .start-dunes {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 200px;
      background: linear-gradient(to top, #1a1008, transparent);
      pointer-events: none;
    }

    /* ========== GAME SCREEN ========== */
    .game-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: 80px;
    }

    /* Header */
    .game-header {
      background: var(--brown);
      padding: 12px 16px 10px;
      border-bottom: 2px solid var(--gold);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--gold);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .back-btn:hover { background: rgba(212, 175, 55, 0.1); }

    .header-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--gold);
      flex: 1;
      text-align: center;
    }

    .header-spacer { width: 36px; }

    /* Status Bar */
    .status-bar {
      background: var(--bg-card2);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .status-row:last-child { margin-bottom: 0; }

    .status-label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .status-value {
      font-size: 16px;
      font-weight: 800;
      color: var(--gold);
    }

    .status-value.cash { color: var(--green); font-size: 14px; }

    .identity-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .badge-peasant { background: #424242; color: #bdbdbd; }
    .badge-smallboss { background: #1b5e20; color: #a5d6a7; }
    .badge-richmerchant { background: #0d47a1; color: #90caf9; }
    .badge-tycoon { background: #4a148c; color: #ce93d8; }
    .badge-king { background: #5d4000; color: var(--gold-light); border: 1px solid var(--gold); }

    /* Level Progress */
    .level-progress-section {
      margin: 10px 16px;
    }

    .level-info {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .level-bar-wrap {
      background: #2a2018;
      border-radius: 10px;
      height: 8px;
      overflow: hidden;
    }

    .level-bar {
      height: 100%;
      border-radius: 10px;
      transition: width 0.5s ease;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--bg-card);
      border-bottom: 1px solid #2a2018;
      margin: 0 16px;
      border-radius: 12px 12px 0 0;
    }

    .tab {
      flex: 1;
      padding: 12px 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    /* Content Area */
    .tab-content {
      flex: 1;
      padding: 14px 16px;
      overflow-y: auto;
    }

    /* Home Tab */
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      margin-top: 6px;
    }

    .earn-grid {
      display: grid;
      gap: 10px;
      margin-bottom: 20px;
    }

    .earn-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-card2);
      border: 1px solid #3a2e1e;
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      width: 100%;
    }

    .earn-btn:active { transform: scale(0.98); }
    .earn-btn.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .earn-icon { font-size: 28px; flex-shrink: 0; }

    .earn-info { flex: 1; }

    .earn-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .earn-reward {
      font-size: 12px;
      color: var(--green);
      margin-top: 2px;
    }

    .earn-cooldown {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .earn-action {
      background: var(--brown-light);
      color: var(--gold);
      border: 1px solid var(--gold);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .earn-action:hover { background: var(--brown); }
    .earn-action.cooldown-btn {
      background: #2a2018;
      color: var(--text-dim);
      border-color: #3a2e1e;
      cursor: not-allowed;
    }

    /* Owned Items */
    .owned-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 80px;
    }

    .owned-item {
      background: var(--bg-card2);
      border: 1px solid #3a2e1e;
      border-radius: 10px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .owned-item .item-icon { font-size: 18px; }
    .owned-item .item-name { font-size: 11px; font-weight: 600; }

    .empty-msg {
      font-size: 13px;
      color: var(--text-dim);
      font-style: italic;
    }

    /* Shop Button */
    .shop-btn-fixed {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--brown);
      border-top: 1px solid #3a2e1e;
      padding: 12px 16px;
      z-index: 20;
    }

    .btn-shop-main {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--brown);
      border: none;
      padding: 14px;
      font-size: 16px;
      font-weight: 800;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* ========== SHOP ========== */
    .shop-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .shop-tabs {
      display: flex;
      background: var(--bg-card);
      border-bottom: 1px solid #2a2018;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .shop-tab {
      padding: 12px 16px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .shop-tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .shop-list {
      flex: 1;
      padding: 12px 14px;
      overflow-y: auto;
      padding-bottom: 20px;
    }

    .shop-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-card2);
      border: 1px solid #3a2e1e;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 8px;
    }

    .shop-item-icon { font-size: 32px; flex-shrink: 0; }

    .shop-item-info { flex: 1; }

    .shop-item-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .shop-item-price {
      font-size: 13px;
      color: var(--gold);
      font-weight: 600;
      margin-top: 3px;
    }

    .shop-buy-btn {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .btn-buy {
      background: var(--gold);
      color: var(--brown);
    }

    .btn-buy:active { transform: scale(0.95); }

    .btn-owned {
      background: #2a3a2a;
      color: #6caf6c;
      cursor: default;
    }

    .btn-cant {
      background: #2a2a2a;
      color: #666;
      cursor: not-allowed;
    }

    /* ========== LEADERBOARD ========== */
    .lb-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }

    .lb-tab {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      background: var(--bg-card2);
      border: 1px solid #3a2e1e;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .lb-tab.active {
      background: var(--gold);
      color: var(--brown);
      border-color: var(--gold);
    }

    .lb-list { display: flex; flex-direction: column; gap: 6px; }

    .lb-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg-card2);
      border: 1px solid #3a2e1e;
      border-radius: 12px;
      padding: 10px 14px;
    }

    .lb-row.is-you {
      border-color: var(--gold);
      background: #1e1a10;
    }

    .lb-rank {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-dim);
      width: 24px;
      text-align: center;
      flex-shrink: 0;
    }

    .lb-rank.gold { color: var(--gold); }
    .lb-rank.silver { color: #c0c0c0; }
    .lb-rank.bronze { color: #cd7f32; }

    .lb-emoji { font-size: 24px; flex-shrink: 0; }

    .lb-info { flex: 1; min-width: 0; }

    .lb-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lb-badge-small {
      display: inline-block;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      margin-top: 3px;
    }

    .lb-assets {
      font-size: 14px;
      font-weight: 800;
      color: var(--gold);
      flex-shrink: 0;
    }

    /* ========== FRIENDS ========== */
    .friends-list { display: flex; flex-direction: column; gap: 10px; }

    .friend-card {
      background: var(--bg-card2);
      border: 1px solid #3a2e1e;
      border-radius: 12px;
      padding: 14px;
    }

    .friend-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .friend-avatar { font-size: 36px; }

    .friend-info { flex: 1; }

    .friend-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .friend-assets {
      font-size: 13px;
      color: var(--gold);
      font-weight: 600;
      margin-top: 2px;
    }

    .friend-actions {
      display: flex;
      gap: 6px;
    }

    .friend-action-btn {
      flex: 1;
      padding: 8px 6px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid;
      transition: all 0.15s;
      text-align: center;
    }

    .btn-visit {
      background: #1a2a3a;
      border-color: #3a6a9a;
      color: #7ab8e8;
    }

    .btn-gift {
      background: #2a1a3a;
      border-color: #7a4aaa;
      color: #b87ae8;
    }

    .btn-pk {
      background: #2a1a1a;
      border-color: #9a3a3a;
      color: #e87a7a;
    }

    .friend-action-btn:active { transform: scale(0.96); }

    /* ========== MODAL ========== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 16px;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--gold);
      border-radius: 16px;
      padding: 24px;
      max-width: 360px;
      width: 100%;
      text-align: center;
    }

    .modal-icon { font-size: 48px; margin-bottom: 12px; }

    .modal-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--gold);
      margin-bottom: 10px;
    }

    .modal-text {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .modal-btns {
      display: flex;
      gap: 10px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .modal-btn:active { transform: scale(0.97); }

    .modal-btn-confirm {
      background: var(--gold);
      color: var(--brown);
    }

    .modal-btn-cancel {
      background: #2a2a2a;
      color: var(--text);
      border: 1px solid #3a3a3a;
    }

    .modal-btn-ok {
      background: var(--gold);
      color: var(--brown);
      width: 100%;
    }

    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--gold);
      border-radius: 16px;
      padding: 20px;
      max-width: 400px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .modal-header h3 {
      font-size: 18px;
      font-weight: 800;
      color: var(--gold);
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .modal-close:hover { color: var(--text); }

    .modal-result {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .result-win { color: var(--gold); }
    .result-lose { color: #e87a7a; }

    /* Gift selection */
    .gift-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
      max-height: 300px;
      overflow-y: auto;
    }

    .gift-option {
      background: var(--bg-card2);
      border: 1px solid #3a2e1e;
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }

    .gift-option:active { transform: scale(0.97); }
    .gift-option.disabled { opacity: 0.4; cursor: not-allowed; }

    .gift-option-icon { font-size: 28px; }
    .gift-option-name { font-size: 11px; font-weight: 600; color: var(--text); margin-top: 4px; }
    .gift-option-price { font-size: 11px; color: var(--gold); margin-top: 2px; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--brown-light);
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 10px 20px;
      border-radius: 25px;
      font-size: 13px;
      font-weight: 700;
      z-index: 200;
      animation: toastIn 0.3s ease;
      white-space: nowrap;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .toast-success { border-color: var(--green); color: var(--green); }
    .toast-error { border-color: #e87a7a; color: #e87a7a; }

    /* ========== RTL SUPPORT ========== */
    [dir="rtl"] body { direction: rtl; }
    [dir="rtl"] .tabs { flex-direction: row-reverse; }
    [dir="rtl"] .header-top { flex-direction: row-reverse; }
    [dir="rtl"] .status-row { flex-direction: row-reverse; }
    [dir="rtl"] .earn-btn { flex-direction: row-reverse; }
    [dir="rtl"] .shop-item { flex-direction: row-reverse; }
    [dir="rtl"] .friend-top { flex-direction: row-reverse; }
    [dir="rtl"] .lb-row { flex-direction: row-reverse; }
    [dir="rtl"] .back-btn { transform: scaleX(-1); }
    [dir="rtl"] .toast { transform: translateX(50%); }
    [dir="rtl"] .toast { left: 50%; right: auto; }
    [dir="rtl"] @keyframes toastIn { from { opacity: 0; transform: translateX(50%) translateY(10px); } to { opacity: 1; transform: translateX(50%) translateY(0); } }

    /* Language switcher */
    .lang-switch {
      display: flex;
      gap: 4px;
      padding: 4px 8px;
      background: var(--bg-card2);
      border-radius: 15px;
      margin-left: auto;
    }
    .lang-btn {
      padding: 3px 8px;
      border: none;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--text-dim);
      transition: all 0.2s;
    }
    .lang-btn.active {
      background: var(--gold);
      color: var(--brown);
    }

    /* ========== SHARE POSTER ========== */
    .share-poster-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 150;
      padding: 20px;
    }

    .share-poster-preview {
      max-width: 280px;
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
      margin-bottom: 16px;
    }

    .share-poster-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .share-action-btn {
      padding: 12px 24px;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.15s;
    }

    .share-action-btn:active { transform: scale(0.96); }

    .btn-whatsapp {
      background: #25D366;
      color: white;
    }

    .btn-download {
      background: var(--gold);
      color: var(--brown);
    }

    .btn-close-share {
      background: #333;
      color: white;
    }

    /* ========== GIFT ANIMATION ========== */
    .gift-animation-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 300;
      overflow: hidden;
    }

    .gift-particle {
      position: absolute;
      font-size: 32px;
      animation: giftFall 2s ease-out forwards;
    }

    @keyframes giftFall {
      0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    .gift-notification {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #2a1a3a, #1a1a2a);
      border: 2px solid #7a4aaa;
      border-radius: 16px;
      padding: 14px 20px;
      z-index: 250;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: notifSlide 0.4s ease;
      max-width: 90%;
    }

    @keyframes notifSlide {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .notif-icon { font-size: 28px; }
    .notif-text { font-size: 13px; color: #b87ae8; font-weight: 600; }

    /* ========== PK MATCHMAKING ========== */
    .pk-match-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .pk-match-title {
      font-size: 24px;
      font-weight: 900;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .pk-spinner {
      width: 80px;
      height: 80px;
      border: 4px solid #333;
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .pk-match-text {
      font-size: 16px;
      color: var(--text-dim);
    }

    .pk-vs-display {
      display: flex;
      align-items: center;
      gap: 30px;
      margin: 30px 0;
    }

    .pk-player-card {
      text-align: center;
      background: var(--bg-card2);
      border: 2px solid var(--gold);
      border-radius: 16px;
      padding: 20px;
      min-width: 120px;
    }

    .pk-player-emoji { font-size: 48px; margin-bottom: 8px; }
    .pk-player-name { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .pk-player-assets { font-size: 14px; color: var(--gold); font-weight: 600; }

    .pk-vs { font-size: 36px; font-weight: 900; color: var(--gold); }

    .pk-result-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .pk-result-effect {
      font-size: 80px;
      margin-bottom: 20px;
      animation: resultPop 0.5s ease;
    }

    @keyframes resultPop {
      0% { transform: scale(0); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .pk-result-title {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .pk-result-win { color: var(--gold); }
    .pk-result-lose { color: #e87a7a; }

    .pk-result-assets {
      font-size: 18px;
      color: var(--text-dim);
      margin-bottom: 20px;
    }

    .close-pk-btn {
      padding: 14px 40px;
      background: var(--gold);
      color: var(--brown);
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ========== AI OPPONENTS FOR PK ========== */
    .ai-opponent-card {
      background: var(--bg-card2);
      border: 2px solid #3a2a4a;
      border-radius: 16px;
      padding: 16px;
      margin: 10px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ai-opponent-info { flex: 1; }
    .ai-opponent-name { font-size: 15px; font-weight: 700; color: var(--text); }
    .ai-opponent-assets { font-size: 12px; color: var(--gold); margin-top: 3px; }

    .btn-challenge {
      padding: 8px 16px;
      background: #9a3a3a;
      color: #e87a7a;
      border: 1px solid #e87a7a;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-challenge:active { transform: scale(0.96); }

    .multiplayer-section { margin-top: 15px; }
    .section-divider {
      border-top: 1px solid #3a2e1e;
      margin: 15px 0;
    }

    /* ========== TERRITORY / LORD SYSTEM ========== */
    .territory-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .territory-card {
      background: var(--bg-card2);
      border: 2px solid #3a2e1e;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .territory-card:active { transform: scale(0.97); }
    .territory-card.owned {
      border-color: var(--gold);
      background: #1e1a10;
    }

    .territory-icon { font-size: 36px; margin-bottom: 6px; }
    .territory-name { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .territory-price { font-size: 11px; color: var(--gold); }
    .territory-income { font-size: 10px; color: var(--green); margin-top: 3px; }
    .territory-owned-badge {
      background: var(--gold);
      color: var(--brown);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
    }

    .lord-title-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      margin-top: 8px;
    }

    .lord-commoner { background: #424242; color: #bdbdbd; }
    .lord-sheikh { background: #1b5e20; color: #a5d6a7; }
    .lord-emir { background: #0d47a1; color: #90caf9; }
    .lord-king { background: #4a148c; color: #ce93d8; }
    .lord-emperor { background: linear-gradient(90deg, #FFD700, #FFA500, #FF6347, #FFD700); color: #000; }

    .territory-stats {
      display: flex;
      justify-content: space-around;
      background: var(--bg-card2);
      border-radius: 12px;
      padding: 12px;
      margin: 10px 0;
    }

    .territory-stat {
      text-align: center;
    }

    .territory-stat-value { font-size: 18px; font-weight: 800; color: var(--gold); }
    .territory-stat-label { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

    /* ========== DAILY SIGNIN ========== */
    .signin-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin: 15px 0;
    }

    .signin-day {
      background: #2a2a2a;
      border: 2px solid #444;
      border-radius: 10px;
      padding: 8px 2px;
      text-align: center;
      font-size: 11px;
      opacity: 0.5;
      transition: all 0.3s;
    }

    .signin-day.checked {
      background: linear-gradient(135deg, #1a4a1a, #0d2d0d);
      border-color: #4caf50;
      opacity: 1;
      box-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
    }

    .signin-day.today {
      border-color: var(--gold);
      background: linear-gradient(135deg, #3a3520, #2a2510);
      opacity: 1;
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.4);
      animation: pulse-border 2s infinite;
    }

    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 12px rgba(212, 175, 55, 0.4); }
      50% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.7); }
    }

    .signin-day-icon { font-size: 20px; }
    .signin-day-label { font-size: 8px; color: #888; margin-top: 3px; }
    .signin-day.checked .signin-day-label { color: #4caf50; }
    .signin-reward { font-size: 9px; color: #888; margin-top: 2px; }
    .signin-day.checked .signin-reward { color: #81c784; }

    /* ========== CHARITY SYSTEM ========== */
    .charity-section {
      background: linear-gradient(135deg, #1a2a3a, #1a1a2a);
      border: 1px solid #3a6a9a;
      border-radius: 16px;
      padding: 16px;
      margin: 15px 0;
    }

    .charity-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .charity-options {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .charity-btn {
      flex: 1;
      min-width: 80px;
      padding: 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid;
      text-align: center;
    }

    .charity-btn.small { background: #1a3a1a; border-color: #3a6a3a; color: #7ab87a; }
    .charity-btn.medium { background: #3a2a1a; border-color: #9a6a3a; color: #e8b87a; }
    .charity-btn.large { background: #3a1a1a; border-color: #9a3a3a; color: #e87a7a; }

    .charity-btn:active { transform: scale(0.96); }

    .charity-result {
      margin-top: 12px;
      padding: 10px;
      background: rgba(212, 175, 55, 0.1);
      border-radius: 8px;
      font-size: 12px;
      color: var(--gold);
      text-align: center;
    }

    .charity-bonus {
      font-size: 16px;
      font-weight: 800;
      color: var(--green);
      margin-top: 6px;
    }

    /* ========== PROPERTY RENTAL INCOME ========== */
    .rental-section {
      background: var(--bg-card2);
      border: 1px solid #3a2e1e;
      border-radius: 12px;
      padding: 12px;
      margin: 10px 0;
    }

    .rental-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .rental-title { font-size: 13px; font-weight: 700; color: var(--gold); }
    .rental-toggle {
      padding: 4px 12px;
      border-radius: 15px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      border: none;
    }

    .rental-toggle.on { background: var(--green); color: white; }
    .rental-toggle.off { background: #444; color: #888; }

    .rental-income {
      font-size: 12px;
      color: var(--text-dim);
    }

    .rental-amount {
      font-size: 16px;
      font-weight: 800;
      color: var(--green);
    }

    /* ========== FRIEND PROFILE ========== */
    .friend-profile {
      min-height: 100vh;
      background: var(--bg);
      padding-bottom: 20px;
    }

    .friend-profile-header {
      background: var(--brown);
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid var(--gold);
    }

    .friend-profile-avatar { font-size: 64px; margin-bottom: 10px; }
    .friend-profile-name { font-size: 20px; font-weight: 700; color: var(--gold); margin-bottom: 5px; }
    .friend-profile-level { font-size: 12px; color: var(--text-dim); }

    .friend-profile-stats {
      display: flex;
      justify-content: space-around;
      padding: 15px;
      background: var(--bg-card2);
      margin: 10px;
      border-radius: 12px;
    }

    .friend-stat { text-align: center; }
    .friend-stat-value { font-size: 16px; font-weight: 800; color: var(--gold); }
    .friend-stat-label { font-size: 10px; color: var(--text-dim); }

    .friend-inventory-section {
      padding: 10px;
    }

    .friend-inventory-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 10px;
    }

    .friend-inventory-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .friend-inventory-item {
      background: var(--bg-card2);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }

    .friend-inventory-icon { font-size: 28px; }
    .friend-inventory-name { font-size: 10px; color: var(--text-dim); margin-top: 4px; }

    .like-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--brown);
      border: none;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 15px;
    }

    .like-btn:active { transform: scale(0.97); }
    .like-btn:disabled { background: #444; color: #888; cursor: not-allowed; }

    /* ========== LORD RANKS ========== */
    .lord-ranks-section {
      margin: 15px 0;
    }

    .lord-rank-card {
      background: var(--bg-card2);
      border: 1px solid #3a2e1e;
      border-radius: 12px;
      padding: 14px;
      margin: 8px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .lord-rank-card.current {
      border-color: var(--gold);
      background: #1e1a10;
    }

    .lord-rank-icon { font-size: 32px; }
    .lord-rank-info { flex: 1; }
    .lord-rank-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .lord-rank-req { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .lord-rank-reward { font-size: 10px; color: var(--green); margin-top: 2px; }
    .lord-rank-status {
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 10px;
      font-weight: 700;
    }

    .lord-rank-status.unlocked { background: var(--green); color: white; }
    .lord-rank-status.locked { background: #444; color: #888; }

    /* ========== WEALTH CHART ========== */
    .wealth-chart-section {
      background: var(--bg-card2);
      border: 1px solid #3a2e1e;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .wealth-chart-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .wealth-chart-container {
      height: 80px;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      background: #1a1510;
      border-radius: 8px;
      padding: 8px;
      position: relative;
      overflow: hidden;
    }
    .wealth-bar {
      flex: 1;
      background: linear-gradient(to top, var(--gold), var(--gold-light));
      border-radius: 3px 3px 0 0;
      min-width: 8px;
      transition: height 0.3s ease;
      position: relative;
    }
    .wealth-bar:hover {
      background: linear-gradient(to top, #FFD700, #FFF0A0);
    }
    .wealth-bar::after {
      content: attr(data-value);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      color: var(--gold);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .wealth-bar:hover::after { opacity: 1; }

    /* ========== NUMBER ROLLING ANIMATION ========== */
    .rolling-number {
      display: inline-block;
      transition: transform 0.1s, opacity 0.1s;
    }
    .rolling-number.updating {
      animation: rollUp 0.3s ease-out;
    }
    .rolling-number.downdating {
      animation: rollDown 0.3s ease-out;
    }
    @keyframes rollUp {
      0% { transform: translateY(100%); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes rollDown {
      0% { transform: translateY(-100%); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    /* Pulse effect for money gain */
    .money-pulse {
      animation: moneyPulse 0.5s ease-out;
    }
    @keyframes moneyPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); color: #4caf50; }
      100% { transform: scale(1); }
    }

    /* ========== SOUND TOGGLE ========== */
    .sound-toggle {
      position: fixed;
      top: 12px;
      right: 50px;
      z-index: 100;
      background: var(--bg-card2);
      border: 1px solid #3a2e1e;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .sound-toggle:hover {
      background: var(--brown-light);
      border-color: var(--gold);
    }
    .sound-toggle.muted { opacity: 0.5; }

    /* ========== FLOATING EFFECTS ========== */
    .float-text {
      position: fixed;
      pointer-events: none;
      font-size: 18px;
      font-weight: 800;
      z-index: 9999;
      animation: floatUp 1s ease-out forwards;
    }
    .float-text.gain { color: var(--green); }
    .float-text.loss { color: #f44336; }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(1.2); }
    }

    /* ========== LEVEL UP EFFECT ========== */
    .levelup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: levelupFade 2s ease-out forwards;
    }
    .levelup-content {
      text-align: center;
      animation: levelupZoom 0.5s ease-out;
    }
    .levelup-icon { font-size: 80px; animation: bounce 0.5s ease infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    @keyframes levelupZoom {
      0% { transform: scale(0); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    @keyframes levelupFade {
      0% { opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { opacity: 0; }
    }
    .levelup-text {
      font-size: 28px;
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(212,175,55,0.8);
      margin-top: 10px;
    }
    .levelup-title {
      font-size: 16px;
      color: var(--text-dim);
      margin-top: 8px;
    }

    /* ========== WORK SYSTEM V2.0 ========== */
    .work-v2-section {
      margin-bottom: 16px;
    }
    .work-v2-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .work-v2-level {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--brown);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 800;
    }
    .work-v2-exp-bar {
      flex: 1;
      height: 8px;
      background: var(--bg-card2);
      border-radius: 4px;
      overflow: hidden;
    }
    .work-v2-exp-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      transition: width 0.3s;
    }
    .work-v2-exp-text {
      font-size: 10px;
      color: var(--text-dim);
    }
    .work-v2-combo {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }
    .combo-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .combo-active {
      background: linear-gradient(135deg, #ff6b00, #ff9500);
      color: white;
    }
    .combo-inactive {
      background: var(--bg-card2);
      color: var(--text-dim);
    }
    .combo-fire { animation: firePulse 0.5s ease infinite; }
    @keyframes firePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    .work-types-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .work-type-card {
      background: var(--bg-card2);
      border-radius: 12px;
      padding: 12px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .work-type-card.unlocked {
      border-color: var(--gold);
    }
    .work-type-card.locked {
      opacity: 0.5;
      filter: grayscale(0.5);
    }
    .work-type-card.on-cooldown {
      opacity: 0.7;
    }
    .work-type-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .work-type-icon {
      font-size: 28px;
    }
    .work-type-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    .work-type-name-en {
      font-size: 10px;
      color: var(--text-dim);
    }
    .work-type-earnings {
      font-size: 14px;
      font-weight: 800;
      color: var(--green);
      margin-bottom: 6px;
    }
    .work-type-cooldown {
      font-size: 11px;
      color: var(--text-dim);
    }
    .work-type-unlock {
      font-size: 10px;
      color: var(--gold);
      margin-top: 4px;
    }
    .work-type-btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .work-type-btn.do {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--brown);
    }
    .work-type-btn.do:active { transform: scale(0.97); }
    .work-type-btn.locked {
      background: var(--gray);
      color: white;
      cursor: not-allowed;

  let lv = LEVELS[0];
  for (const l of LEVELS) {
    if (assets >= l.threshold) lv = l;

function getNextLevel(assets) {
  for (const l of LEVELS) {
    if (assets < l.threshold) return l;
  }
  return null;

function getLevelProgress(assets) {
  const lv = getLevel(assets);
  const next = getNextLevel(assets);
  if (!next) return 100;
  const prev = lv.threshold;
  return Math.min(100, ((assets - prev) / (next.threshold - prev)) * 100);
}

      return Math.floor(baseIncome * (1 + lordBonus));

    function getLordRankBonus() {
      const totalValue = ownedTerritories.value.reduce((sum, tId) => {
        const t = territories.find(ter => ter.id === tId);
        return sum + (t ? t.price : 0);
      }, 0);

      if (totalValue >= 500000000) return 0.5; // King 50%
      if (totalValue >= 200000000) return 0.25; // Emir 25%
      if (totalValue >= 50000000) return 0.1; // Sheikh 10%
      return 0;

      const totalValue = ownedTerritories.value.reduce((sum, tId) => {
        const t = territories.find(ter => ter.id === tId);
        return sum + (t ? t.price : 0);
      }, 0);
      if (totalValue >= 2000000000) return LORD_RANKS[4]; // Emperor
      if (totalValue >= 500000000) return LORD_RANKS[3]; // King
      if (totalValue >= 200000000) return LORD_RANKS[2]; // Emir

      return lastSigninDate.value !== today;
    }

    function getSigninDay() {
      // Find current streak by counting consecutive days signed in
      const today = new Date();
      let streak = 0;
      let checkDate = new Date(today);
      for (let i = 0; i < 7; i++) {
        const dateStr = checkDate.toDateString();
        if (signinHistory.value.includes(dateStr)) {
          streak++;
          checkDate.setDate(checkDate.getDate() - 1);
        } else {
          break;
        }
      }
      return (streak % 7) + 1;
    }

    function hasSignedOnDay(dayNum) {
      // Check if user signed in on the day corresponding to this day number in cycle
      const today = new Date();
      const targetDate = new Date(today);
      const currentCycleDay = getSigninDay();
      // Calculate which date we need to check
      const daysAgo = currentCycleDay - dayNum;
      targetDate.setDate(targetDate.getDate() - daysAgo);
      return signinHistory.value.includes(targetDate.toDateString());
    }
